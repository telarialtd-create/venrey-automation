<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Venrey スケジュール更新</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", sans-serif;
      background: #f0f4f8;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    .card {
      background: white;
      border-radius: 16px;
      padding: 40px 32px;
      width: 90%;
      max-width: 420px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.10);
      text-align: center;
    }
    h1 { font-size: 20px; color: #1a202c; margin-bottom: 8px; }
    .subtitle { font-size: 13px; color: #718096; margin-bottom: 32px; }
    .btn {
      display: inline-block;
      width: 100%;
      padding: 16px;
      font-size: 17px;
      font-weight: bold;
      color: white;
      background: #4299e1;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn:hover:not(:disabled) { background: #3182ce; }
    .btn:disabled { background: #a0aec0; cursor: not-allowed; }

    /* ステータスボックス */
    .status-box {
      margin-top: 24px;
      padding: 16px;
      border-radius: 10px;
      font-size: 15px;
      font-weight: bold;
      display: none;
    }
    .status-box.running {
      display: block;
      background: #ebf8ff;
      color: #2b6cb0;
    }
    .status-box.success {
      display: block;
      background: #f0fff4;
      color: #276749;
      font-size: 22px;
    }
    .status-box.error {
      display: block;
      background: #fff5f5;
      color: #c53030;
    }

    /* スピナー */
    .spinner {
      display: inline-block;
      width: 18px; height: 18px;
      border: 3px solid #bee3f8;
      border-top-color: #3182ce;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      vertical-align: middle;
      margin-right: 8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* 進行ステップ */
    .steps {
      margin-top: 12px;
      font-size: 12px;
      color: #4a90d9;
      font-weight: normal;
    }
    .note { font-size: 12px; color: #a0aec0; margin-top: 16px; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Venrey スケジュール更新</h1>
    <p class="subtitle">スプレッドシートから今週のシフトを自動入力します</p>

    <button class="btn" id="runBtn" onclick="triggerUpdate()">
      今週のスケジュールを更新する
    </button>

    <!-- 実行中 -->
    <div class="status-box" id="statusRunning">
      <span class="spinner"></span>更新中です...
      <div class="steps" id="stepText">ジョブを開始しています</div>
    </div>

    <!-- 完了 -->
    <div class="status-box success" id="statusSuccess"></div>

    <!-- エラー -->
    <div class="status-box error" id="statusError"></div>

    <p class="note" id="noteText">実行後、反映まで約2〜3分かかります</p>
  </div>

  <script>
    const OWNER    = "telarialtd-create";
    const REPO     = "venrey-automation";
    const WORKFLOW = "update_schedule.yml";

    // トークンを localStorage に保存（初回のみ入力）
    let token = localStorage.getItem("gh_token");
    if (!token) {
      token = prompt("GitHubトークンを入力してください（初回のみ）:");
      if (token) localStorage.setItem("gh_token", token);
    }

    // ワークフロー起動用ヘッダー（認証が必要）
    const authHeaders = {
      "Authorization": `Bearer ${token}`,
      "Accept": "application/vnd.github+json"
    };
    // ステータス確認用ヘッダー（公開リポジトリなので認証不要）
    const readHeaders = { "Accept": "application/vnd.github+json" };

    let pollTimer = null;
    let triggeredAt = null; // ボタンを押した時刻

    // ページ読み込み・キャッシュ復元時にステータスを必ずリセット
    window.addEventListener("pageshow", function() {
      hide("statusRunning");
      hide("statusSuccess");
      hide("statusError");
      document.getElementById("runBtn").disabled = false;
      document.getElementById("noteText").style.display = "";
      if (pollTimer) { clearTimeout(pollTimer); pollTimer = null; }
      triggeredAt = null;
    });

    async function triggerUpdate() {
      if (!token) {
        showError("トークンが設定されていません。ページを再読み込みしてください。");
        return;
      }

      // ボタンを無効化・表示リセット
      document.getElementById("runBtn").disabled = true;
      hide("statusSuccess");
      hide("statusError");
      setStep("ジョブを開始しています...");
      show("statusRunning");
      document.getElementById("noteText").style.display = "none";
      triggeredAt = new Date();

      try {
        // ワークフローをトリガー
        const res = await fetch(
          `https://api.github.com/repos/${OWNER}/${REPO}/actions/workflows/${WORKFLOW}/dispatches`,
          { method: "POST", headers: authHeaders, body: JSON.stringify({ ref: "main" }) }
        );
        if (res.status !== 204) {
          const d = await res.json().catch(() => ({}));
          showError(`起動エラー (${res.status}): ${d.message || ""}`);
          return;
        }

        // GitHub API への反映に時間がかかるため10秒待ってからポーリング開始
        setStep("実行準備中...");
        await sleep(10000);
        pollStatus();

      } catch (e) {
        showError("通信エラーが発生しました。インターネット接続を確認してください。");
      }
    }

    async function pollStatus() {
      // タイムアウト: 10分経っても完了しなければエラー表示
      if (triggeredAt && (new Date() - triggeredAt) > 10 * 60 * 1000) {
        showError("タイムアウトしました。GitHubで確認してください。\nhttps://github.com/" + OWNER + "/" + REPO + "/actions");
        return;
      }

      try {
        // 最新の workflow run を認証なしで取得（公開リポジトリ）
        const res = await fetch(
          `https://api.github.com/repos/${OWNER}/${REPO}/actions/workflows/${WORKFLOW}/runs?per_page=5`,
          { headers: readHeaders }
        );
        const data = await res.json();

        // ボタンを押した時刻より後（多少の時計ズレを考慮して5秒前まで許容）に
        // 作成されたrunだけを対象にする。
        // ※ フォールバックで古いrunを使わないことで誤検知を防ぐ
        const run = (data.workflow_runs || []).find(r => {
          return triggeredAt ? new Date(r.created_at) >= new Date(triggeredAt - 5000) : true;
        });

        if (!run) {
          // まだ新しいrunがAPIに反映されていない → 待機して再試行
          setStep("実行待機中...");
          pollTimer = setTimeout(pollStatus, 5000);
          return;
        }

        const status     = run.status;      // queued / in_progress / completed
        const conclusion = run.conclusion;  // success / failure / null

        if (status === "queued") {
          setStep("キュー待機中...");
          pollTimer = setTimeout(pollStatus, 5000);

        } else if (status === "in_progress") {
          setStep("スケジュールを更新中...");
          pollTimer = setTimeout(pollStatus, 5000);

        } else if (status === "completed") {
          hide("statusRunning");
          document.getElementById("noteText").style.display = "";
          document.getElementById("runBtn").disabled = false;

          if (conclusion === "success") {
            showSuccess("✅ 更新終了！！\nVenreyのスケジュールが更新されました");
          } else {
            showError(`更新に失敗しました（${conclusion}）\nGitHub Actions のログを確認してください。`);
          }
        } else {
          pollTimer = setTimeout(pollStatus, 5000);
        }

      } catch (e) {
        setStep("確認中...");
        pollTimer = setTimeout(pollStatus, 8000);
      }
    }

    // ── ヘルパー関数 ──
    function showSuccess(msg) {
      const el = document.getElementById("statusSuccess");
      el.style.display = "block";
      el.innerText = msg;
    }
    function showError(msg) {
      hide("statusRunning");
      const el = document.getElementById("statusError");
      el.style.display = "block";
      el.innerText = msg;
      document.getElementById("runBtn").disabled = false;
      document.getElementById("noteText").style.display = "";
    }
    function setStep(msg) {
      document.getElementById("stepText").innerText = msg;
    }
    function show(id) { document.getElementById(id).style.display = "block"; }
    function hide(id) { document.getElementById(id).style.display = "none"; }
    function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }
  </script>
</body>
</html>
